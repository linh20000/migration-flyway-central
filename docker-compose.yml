version: '3'
services:
  flyway:
    image: flyway/flyway:latest
    container_name: migragtion-service
    env_file:
      - /opt/global/.env
    environment:
      - FLYWAY_USER=${POSTGRESQL_USERNAME}
      - FLYWAY_PASSWORD=${POSTGRESQL_PASSWORD}
      - FLYWAY_URL=${POSTGRESQL_DATABASE_URL}
      - FLYWAY_SCHEMAS=migrations
      - FLYWAY_GROUP=true
#      - FLYWAY_LICENSE_KEY=${FLYWAY_LICENSE_KEY}
#      - FLYWAY_EDITION=${FLYWAY_EDITION}
    command: -locations=filesystem:/flyway/sql -connectRetries=60 migrate
    volumes:
      - ./services/main/migration:/flyway/sql